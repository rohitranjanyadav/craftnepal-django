{% extends "base.html" %}

{% block content %}
  <section class="max-w-3xl mx-auto px-6 py-10">
    <div class="mb-8">
      <h1 class="text-2xl md:text-3xl font-semibold text-gray-900">Profile</h1>
      <p class="text-sm text-gray-600 mt-1">Your account details.</p>
    </div>

    <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-600">Username</span>
        <span class="text-sm font-medium text-gray-900">{{ request.user.username }}</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-600">Email</span>
        <span class="text-sm font-medium text-gray-900">
          {% if request.user.email %}{{ request.user.email }}{% endif %}
        </span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-600">Account Type</span>
        <span class="text-sm font-medium text-gray-900">
          {% if request.user.is_staff %}Admin{% else %}Customer{% endif %}
        </span>
      </div>
    </div>
  </section>
{% endblock %}
