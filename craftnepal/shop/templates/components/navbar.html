<nav
  class="container sticky top-0 z-50 bg-white shadow-md mx-auto flex items-center justify-between py-4 px-6"
>
  <a href="/" class="text-2xl font-medium"> CraftNepal </a>

  <div class="hidden md:flex space-x-6">
    {% for category in category_objects %}
      <a
        href="/?category={{ category.category_name|urlencode }}"
        class="text-gray-700 hover:text-black text-sm uppercase"
      >{{ category.category_name }}</a>
    {% endfor %}
  </div>

  <!-- Right Side -->
  <div class="flex items-center space-x-4">
    <form method="GET" action="/" class="hidden md:block">
      <div class="flex items-center border rounded overflow-hidden">
        <input
          type="text"
          name="item_name"
          placeholder="Search products..."
          value="{{ request.GET.item_name }}"
          class="px-3 py-1 outline-none text-sm w-40 md:w-56"
        />

        <button type="submit" class="bg-black text-white px-3 py-1 text-sm">
          Search
        </button>
      </div>
    </form>
    <div class="relative" id="profileMenuWrapper">
      <button
        type="button"
        class="hover:text-black"
        aria-haspopup="true"
        aria-expanded="false"
        onclick="toggleProfileMenu()"
        id="profileMenuButton"
      >
        👤
      </button>
      <div
        id="profileMenu"
        class="hidden absolute right-0 mt-2 w-40 bg-white border border-gray-200 rounded shadow-lg text-sm"
        role="menu"
        aria-labelledby="profileMenuButton"
      >
        <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
        {% if request.user.is_authenticated %}
          <a href="/auth/logout/" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
        {% else %}
          <a href="/auth/login/" class="block px-4 py-2 hover:bg-gray-100">Login</a>
        {% endif %}
      </div>
    </div>

    <button onclick="toggleCart()" class="relative">
      🛒
      <span
        id="cart-count"
        class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 rounded-full"
      >
        0
      </span>
    </button>

    <!-- Mobile Menu Button -->
    <button onclick="toggleMenu()" class="md:hidden">☰</button>
  </div>
</nav>

<!-- Mobile Menu -->
<div id="mobileMenu" class="hidden bg-white shadow-md p-4">
  {% for category in category_objects %}
    <a href="/?category={{ category.category_name|urlencode }}" class="block py-2">{{ category.category_name }}</a>
  {% endfor %}
</div>
<div class="md:hidden container mx-auto px-6 pb-3">
  <form method="GET" action="/" class="w-full">
    <div class="flex items-center border rounded overflow-hidden bg-white">
      <input
        type="text"
        name="item_name"
        placeholder="Search products..."
        value="{{ request.GET.item_name }}"
        class="w-full px-3 py-2 outline-none text-sm"
      />
      <button type="submit" class="bg-black text-white px-3 py-2 text-sm">
        Search
      </button>
    </div>
  </form>
</div>

<script>
  function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("hidden");
  }

  function toggleProfileMenu() {
    const menu = document.getElementById("profileMenu");
    menu.classList.toggle("hidden");
  }

  document.addEventListener("click", function (event) {
    const wrapper = document.getElementById("profileMenuWrapper");
    const menu = document.getElementById("profileMenu");
    if (!wrapper || !menu) return;
    if (!wrapper.contains(event.target)) {
      menu.classList.add("hidden");
    }
  });
</script>
