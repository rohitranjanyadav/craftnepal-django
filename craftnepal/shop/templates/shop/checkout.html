{% extends "base.html" %} {% block content %}
<section class="max-w-4xl mx-auto px-6 py-10">
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold text-gray-900">Checkout</h1>
    <p class="text-sm text-gray-600 mt-1">
      Provide your details to place the order.
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <form
      id="checkoutForm"
      method="POST"
      class="lg:col-span-2 bg-white border border-gray-200 rounded-lg p-6 shadow-sm"
    >
      {% csrf_token %}

      <input type="hidden" name="cart_items" id="cartItemsInput" />
      <input type="hidden" name="total_price" id="totalPriceInput" />
      <input type="hidden" name="total_quantity" id="totalQuantityInput" />

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 mb-1"
            for="contact_no"
            >Contact Number</label
          >
          <input
            id="contact_no"
            name="contact_no"
            type="text"
            required
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"
            placeholder="98XXXXXXXX"
            value="{{ request.POST.contact_no }}"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 mb-1"
            for="email"
            >Email</label
          >
          <input
            id="email"
            name="email"
            type="email"
            required
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"
            placeholder="you@example.com"
            value="{{ request.POST.email }}"
          />
        </div>
        <div class="md:col-span-2">
          <label
            class="block text-sm font-medium text-gray-700 mb-1"
            for="address"
            >Address</label
          >
          <input
            id="address"
            name="address"
            type="text"
            required
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"
            placeholder="Street, City"
            value="{{ request.POST.address }}"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 mb-1"
            for="payment_method"
          >
            Payment Method
          </label>

          <select
            id="payment_method"
            name="payment_method"
            required
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-black"
            onchange="toggleEsewaButton()"
          >
            <option value="" disabled selected>Select a method</option>
            <option value="Cash On Delivery">Cash On Delivery</option>
            <option value="Esewa">eSewa</option>
          </select>
        </div>
      </div>

      <div class="mt-6 flex items-center justify-between">
        <a href="/" class="text-sm text-gray-600 hover:text-gray-900"
          >Return to shop</a
        >
        <div class="flex gap-3">
          <button
            id="codButton"
            type="submit"
            class="bg-black text-white px-6 py-2 rounded-md text-sm font-medium hover:bg-gray-900"
          >
            Place Order
          </button>
          <button
            id="esewaButton"
            type="submit"
            class="hidden bg-green-600 text-white px-6 py-2 rounded-md text-sm font-medium hover:bg-green-700"
          >
            Pay with eSewa
          </button>
        </div>
      </div>
    </form>

    <aside class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-sm font-semibold text-gray-900 mb-4">Order Summary</h2>
      <div id="orderItems" class="space-y-4"></div>
      <div
        class="mt-4 border-t border-gray-200 pt-4 text-sm text-gray-700 space-y-2"
      >
        <div class="flex justify-between">
          <span>Items</span>
          <span id="orderItemCount">0</span>
        </div>
        <div class="flex justify-between">
          <span>Total Quantity</span>
          <span id="orderTotalQty">0</span>
        </div>
        <div class="flex justify-between">
          <span>Total</span>
          <span class="font-medium" id="orderTotalPrice">Rs. 0</span>
        </div>
      </div>
      <p class="text-xs text-gray-500 mt-4">
        Payment status will remain pending until your order is confirmed.
      </p>
    </aside>
  </div>
</section>

<script>
  function formatPrice(value) {
    const number = Number(value) || 0;
    return number.toFixed(2);
  }

  function getCheckoutCartTotals() {
    const cart = JSON.parse(localStorage.getItem("cart")) || {};
    let itemCounter = 0;
    let totalQuantity = 0;
    let totalAmount = 0;

    Object.keys(cart).forEach((id) => {
      const item = cart[id];
      if (!Array.isArray(item) || item.length < 5) return;

      const qty = Number(item[0]) || 0;
      const unitPrice = Number(item[3]) || 0;
      const lineTotal = Number(item[4]) || unitPrice * qty;

      if (qty <= 0) return;

      itemCounter += 1;
      totalQuantity += qty;
      totalAmount += lineTotal;
    });

    return { cart, itemCounter, totalQuantity, totalAmount };
  }

  function setCheckoutHiddenFields(cart, totalQuantity, totalAmount) {
    const cartItemsInput = document.getElementById("cartItemsInput");
    const totalPriceInput = document.getElementById("totalPriceInput");
    const totalQuantityInput = document.getElementById("totalQuantityInput");

    if (cartItemsInput) {
      cartItemsInput.value = JSON.stringify(cart);
    }
    if (totalPriceInput) {
      totalPriceInput.value = formatPrice(totalAmount);
    }
    if (totalQuantityInput) {
      totalQuantityInput.value = totalQuantity;
    }
  }

  function loadCheckoutCart() {
    const orderItems = document.getElementById("orderItems");
    const itemCount = document.getElementById("orderItemCount");
    const totalQty = document.getElementById("orderTotalQty");
    const totalPrice = document.getElementById("orderTotalPrice");

    if (!orderItems) return;

    orderItems.innerHTML = "";
    const { cart, itemCounter, totalQuantity, totalAmount } = getCheckoutCartTotals();

    Object.keys(cart).forEach((id) => {
      const item = cart[id];
      if (!Array.isArray(item) || item.length < 5) return;

      const qty = Number(item[0]) || 0;
      const name = item[1] || "Product";
      const image = item[2] || "https://via.placeholder.com/80";
      const unitPrice = Number(item[3]) || 0;
      const lineTotal = Number(item[4]) || unitPrice * qty;

      if (qty <= 0) return;

      orderItems.innerHTML += `
					<div class="flex items-center gap-4">
						<img src="${image}" alt="${name}" class="w-14 h-14 object-cover rounded" onerror="this.src='https://via.placeholder.com/80'" />
						<div class="flex-1">
							<p class="text-sm font-medium text-gray-900">${name}</p>
							<p class="text-xs text-gray-500">Qty: ${qty}</p>
						</div>
						<div class="text-right">
							<p class="text-sm text-gray-900">Rs. ${formatPrice(unitPrice)}</p>
							<p class="text-xs text-gray-500">Line: Rs. ${formatPrice(lineTotal)}</p>
						</div>
					</div>
				`;
    });

    itemCount.textContent = itemCounter;
    totalQty.textContent = totalQuantity;
    totalPrice.textContent = `Rs. ${formatPrice(totalAmount)}`;

    setCheckoutHiddenFields(cart, totalQuantity, totalAmount);
  }

  function toggleEsewaButton() {
    const paymentMethod = document.getElementById("payment_method").value;
    const codButton = document.getElementById("codButton");
    const esewaButton = document.getElementById("esewaButton");

    if (paymentMethod === "Esewa") {
      codButton.classList.add("hidden");
      esewaButton.classList.remove("hidden");
    } else {
      codButton.classList.remove("hidden");
      esewaButton.classList.add("hidden");
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    const checkoutForm = document.getElementById("checkoutForm");

    loadCheckoutCart();
    toggleEsewaButton();

    checkoutForm.addEventListener("submit", (event) => {
      loadCheckoutCart();
      const { cart, totalQuantity, totalAmount } = getCheckoutCartTotals();
      setCheckoutHiddenFields(cart, totalQuantity, totalAmount);

      if (totalAmount <= 0) {
        event.preventDefault();
        alert("Your cart is empty.");
      }
    });
  });
</script>
{% endblock %}
