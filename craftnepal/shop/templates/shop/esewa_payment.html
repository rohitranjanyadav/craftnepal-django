{% extends "base.html" %}

{% block content %}
  <section class="max-w-2xl mx-auto px-6 py-16 text-center">
    <h1 class="text-2xl font-semibold text-gray-900">Redirecting to eSewa</h1>
    <p class="text-sm text-gray-600 mt-2">Please wait while we open the payment page.</p>
    <form
      id="esewa-payment-form"
      class="hidden"
      method="post"
      action="https://rc-epay.esewa.com.np/api/epay/main/v2/form"
    >
      {{ form|safe }}
    </form>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("esewa-payment-form");
      if (form) {
        form.submit();
      }
    });
  </script>
{% endblock %}
