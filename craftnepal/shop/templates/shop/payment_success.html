{% extends "base.html" %}

{% block content %}
  <section class="max-w-2xl mx-auto px-6 py-16 text-center">
    <div class="bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
      <h1 class="text-2xl font-semibold text-gray-900">Payment Successful</h1>
      <p class="text-sm text-gray-600 mt-2">
        Your eSewa payment has been completed.
      </p>
      <p class="text-xs text-gray-500 mt-3">
        Transaction ID: {{ transaction_uuid }}
      </p>
      <a
        href="/myorder/"
        class="inline-flex mt-6 bg-black text-white px-5 py-2 rounded-md text-sm font-medium hover:bg-gray-900"
      >
        View Orders
      </a>
    </div>
  </section>
{% endblock %}
