{% extends "base.html" %} {% block content %}

<div class="p-6">
  <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow">
    <div class="flex flex-col md:flex-row">
      <!-- LEFT: Thumbnails -->
      <div class="hidden md:flex flex-col space-y-4 mr-6">
        {% if product_object.image %}
        <img
          src="{{ product_object.image }}"
          class="w-20 h-20 object-cover rounded-lg border border-black cursor-pointer"
        />
        {% endif %}
      </div>

      <!-- MAIN IMAGE -->
      <div class="md:w-1/2">
        <img
          src="{{ product_object.image }}"
          class="w-full h-auto object-cover rounded-lg"
        />
      </div>

      <!-- RIGHT CONTENT -->
      <div class="md:w-1/2 md:ml-10 mt-6 md:mt-0">
        <h1 class="text-2xl md:text-3xl font-semibold mb-2">
          {{ product_object.title }}
        </h1>

        <p class="text-xl text-gray-500 mb-2">Rs. {{ product_object.price }}</p>

        <p class="text-gray-600 mb-4">{{ product_object.description }}</p>

        <!-- Quantity -->
        <div class="mb-6">
          <p class="text-gray-700">Quantity:</p>
          <div class="flex items-center space-x-4 mt-2">
            <button
              onclick="decreaseQty()"
              class="px-2 py-1 bg-gray-200 rounded"
            >
              -
            </button>
            <span id="qty" class="text-lg">1</span>
            <button
              onclick="increaseQty()"
              class="px-2 py-1 bg-gray-200 rounded"
            >
              +
            </button>
          </div>
        </div>

        <!-- Add to Cart -->
        <button
          onclick="addToCart('{{ product_object.id }}','{{ product_object.title|escapejs }}','{{ product_object.price }}','{{ product_object.image|escapejs }}')"
          class="bg-black text-white py-2 px-6 rounded w-full mb-4 hover:bg-gray-900"
        >
          ADD TO CART
        </button>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script>
  let quantity = 1;

  function increaseQty() {
    quantity++;
    document.getElementById("qty").innerText = quantity;
  }

  function decreaseQty() {
    if (quantity > 1) {
      quantity--;
      document.getElementById("qty").innerText = quantity;
    }
  }

  function addToCart(id, name, price, image) {
    let cart = JSON.parse(localStorage.getItem("cart")) || {};
    const qtyToAdd = Number(quantity) || 1;
    const unitPrice = Number(price) || 0;
    const safeImage = image || "https://via.placeholder.com/80";

    if (cart[id]) {
      // Support both old and new formats, then normalize.
      if (cart[id].length === 3) {
        const oldQty = Number(cart[id][0]) || 1;
        const oldName = cart[id][1] || name;
        const oldTotal = Number(cart[id][2]) || 0;
        const oldUnit = oldQty > 0 ? oldTotal / oldQty : unitPrice;
        cart[id] = [oldQty, oldName, safeImage, oldUnit, oldTotal];
      }

      cart[id][0] += qtyToAdd;
      cart[id][4] = cart[id][0] * unitPrice;
      cart[id][3] = unitPrice;
      if (!cart[id][2]) {
        cart[id][2] = safeImage;
      }
    } else {
      cart[id] = [qtyToAdd, name, safeImage, unitPrice, unitPrice * qtyToAdd];
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    if (typeof loadCart === "function") {
      loadCart();
    }

    alert("Added to cart");
  }
</script>

{% endblock %}
